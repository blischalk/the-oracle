arcana:
  - name: Iron Shroud
    effect: "When worn, reduces all incoming damage by 2 (to a minimum of 0). Once per day, can be activated to completely negate one source of damage. After activation, lies inert until the next dawn. The wearer always feels watched."
    cost: null
    charges: null
  - name: The Pale Lantern
    effect: "Burns with cold white flame. Reveals hidden doors, invisible creatures, and concealed Arcana within 30ft. Creatures of the Odd recoil from its light. Oil is unknown — it never seems to run dry, but sometimes flickers on its own."
    cost: null
    charges: null
  - name: Voidstone
    effect: "A smooth black stone that absorbs sound in a 10ft radius around the holder. All activity within the radius is completely silent. Lasts as long as held. The holder cannot hear anything outside the radius while using it."
    cost: null
    charges: null
  - name: Twinblade
    effect: "A short blade that exists simultaneously in two places. When it strikes, it deals damage twice. On a critical success (roll equal to STR exactly), it phases through armour entirely. Hums faintly when near other Arcana."
    cost: null
    charges: null
  - name: The Compact of Salt
    effect: "A folded paper contract written in old salt-trade cipher. Any verbal agreement made while this is held is binding — both parties know if the other breaks it, though the compact imposes no physical consequence. Duplicating or forging it fails silently."
    cost: null
    charges: null
  - name: Breath of the Deep
    effect: "A small brass inhaler. Using it grants the ability to breathe underwater and see in total darkness for 1 hour. 3 charges. After the last charge, it fills with seawater and is useless."
    cost: null
    charges: 3
  - name: Clockwork Eye
    effect: "Replaces one eye (requires a STR Save during installation; failure means 1d6 STR damage). The clockwork eye sees perfectly in low light and can zoom in on distant objects. Once per day it can read any text, even if the language is unknown, translating it into the bearer's native tongue."
    cost: null
    charges: null
  - name: The Hollow Crown
    effect: "A crown of dull iron. The wearer can hear the surface thoughts of anyone within 20ft (intentions, emotions, fears — not full sentences). WIL Save each hour or the wearer cannot distinguish their own thoughts from those of others."
    cost: null
    charges: null

