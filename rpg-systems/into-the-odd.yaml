rules:
  combat: |
    Combat is simultaneous and fast. On their turn, characters act in whatever order makes narrative sense.
    Players roll all dice — both for their own attacks and for enemy damage dealt to them (the Referee announces what dice to roll).
    Attack roll: roll your weapon's damage die. Reduce the result by the target's Armour (if any); the remainder is damage.
    Damage first reduces HP. When HP reaches 0, remaining damage goes to STR.
    On taking direct STR damage, the character must make a STR Save (d20 equal to or under STR) or suffer Critical Damage.
    Critical Damage: the character is incapacitated and dying. Without immediate aid they will die.
    If STR is reduced to 0, the character dies outright.
  saves: |
    A Save is called when a character faces a dangerous or uncertain situation where their attributes are directly tested.
    Roll d20. If the result is equal to or under the relevant attribute (STR, DEX, or WIL), the save succeeds.
    A roll of 1 is always a success. A roll of 20 is always a failure.
    Do not call for saves for trivial actions. Saves are for peril, not routine activity.
  damage: |
    Weapons and hazards deal damage according to their listed die (d4, d6, d8, d10, d12).
    Subtract the target's Armour value from incoming damage. The remainder reduces HP.
    When HP reaches 0, excess damage goes directly to STR.
    Unarmed attacks deal d4 damage. Improvised weapons deal d4 or d6 at the Referee's discretion.
    Enhanced attacks (from advantage, position, or special circumstances) roll twice and take the higher result.
    Impaired attacks (from wounds, disadvantage, or poor conditions) roll twice and take the lower result.
  critical_damage: |
    When a character takes STR damage (from HP reaching 0), they must immediately make a STR Save.
    If the save fails, the character suffers Critical Damage: they collapse and are dying.
    A critically damaged character can take no actions until stabilised by another character using first aid or similar means.
    If left unattended after Critical Damage, the character dies at the end of the next turn or scene.
  death: |
    If STR is reduced to 0, the character dies immediately — no save, no last words.
    Characters may also die from Critical Damage if not stabilised in time.
    Death is permanent. There is no resurrection in Into the Odd.
  blast: |
    Some weapons and hazards have the Blast property. Blast attacks affect all targets within a defined area.
    Roll the damage die once and apply that result to every target in the area (each may reduce by their own Armour).
    Blast is lethal in enclosed spaces. Grenades, fire bombs, and spread-shot weapons commonly have this property.
  morale: |
    Enemies and NPCs have breaking points. When outmatched, badly wounded, or when their leader falls, they may flee.
    Named enemies and leaders make a WIL Save to hold their ground. Lesser minions and fodder flee automatically when conditions are bad.
    The Referee determines when morale is tested. Clever players can exploit morale to end fights without killing everyone.
  reactions: |
    When characters encounter an NPC or creature whose attitude is uncertain, roll 2d6 to determine their initial reaction.
    2–3: Hostile — attacks or makes demands immediately.
    4–5: Unfriendly — suspicious and wary; may attack if provoked.
    6–8: Neutral — indifferent; will deal or talk if approached carefully.
    9–11: Friendly — open to conversation and trade.
    12: Helpful — actively wants to assist.
    Reactions can shift based on how the characters behave. A good argument, a bribe, or an insult all matter.
  rests: |
    Short Rest: the character rests for a few minutes in a safe spot. HP fully recovers.
    Full Rest: the character sleeps a full night in relative safety. HP recovers and the Referee may allow a small amount of STR recovery (typically 1d6 STR back, up to maximum).
    Rest is impossible while in danger. Being Deprived prevents HP recovery even from rest.
  luck: |
    When the outcome of a situation is uncertain but no attribute directly applies, the Referee may call for a Luck roll.
    Roll d6. On a 4 or higher, luck favours the character. On 1–3, luck is against them.
    Luck rolls are rare. Most situations should be resolved through player choice and attribute saves.
  bulky: |
    Some items are marked Bulky. A Bulky item requires two hands or significant physical effort to carry and use effectively.
    A character cannot effectively use a Bulky weapon or carry a Bulky item and also use a shield or second weapon simultaneously.
    The Referee may rule that carrying too many Bulky items Deprives the character of effective movement.
  deprived: |
    A character is Deprived when they lack a basic need: food, water, warmth, or sleep.
    A Deprived character cannot recover HP from any source.
    If a character remains Deprived for a full day without relief, they may also begin to lose STR (Referee's discretion).
    Address Deprivation before attempting to rest or recover.
  ability_score_loss: |
    Attribute loss (STR, DEX, or WIL) from damage, poison, or other effects is serious.
    Attributes recover with full rest and care, at the Referee's discretion — typically 1d6 per night of proper rest, not exceeding the original maximum.
    Some injuries or Arcana effects may reduce attributes permanently. The Referee will be clear when this is the case.

