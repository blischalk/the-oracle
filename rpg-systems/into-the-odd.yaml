setting:
  world: |
    The world of Into the Odd is an industrial age gone strange. Steam-powered machinery fills the factories of great cities. The railways push into wild country. But beneath the progress lies something older and more dangerous: the Odd.

    The Odd is not magic in any comfortable sense. It is the impossible made real — artefacts of unknown manufacture, entities that do not obey natural law, places where the rules of the world simply break down. No one knows where the Odd originates. Scholars argue. Cults worship it. Soldiers try to contain it. Entrepreneurs try to sell it.

    Beyond the cities, the land is strange and underexplored. Ruins of older civilisations dot the wilderness. Expeditions set out and sometimes return — sometimes with wealth, sometimes broken, sometimes not at all.

  bastion: |
    Bastion is the great city at the centre of the known world — though "great" is a matter of perspective. It is enormous, smog-choked, and teeming with humanity in all its desperation and ambition. The streets are gas-lit at night. The factories run day and night, belching smoke that turns the sky a permanent shade of bruised yellow.

    Bastion is divided into quarters, each with its own character. The Docks bring in goods from across the world. The Merchant Quarter is where money is made and promises are broken. The Works is where the factories stand and the workers toil. The Pale is the old city, where the oldest buildings hide the oldest secrets.

    Bastion has a Governor and an Ironclad Council, but power is messy. Old money, new industry, criminal networks, and military factions all push and pull. The Constabulary keeps order with varying degrees of honesty. Churches minister to the faithful and to the desperate.

    The city swallows people. It chews them up and either spits them out wealthy, ruined, or changed by something they should never have touched.

  the_odd_country: |
    Outside Bastion's boundaries lies the Odd Country — the unmapped territories where the rules of the city don't apply. The railways reach into parts of it, but the trains don't always run on time, and sometimes they don't come back.

    The wilderness holds ruins of civilisations older than Bastion's records. Strange structures half-buried in hills. Tunnels that go deeper than any mine. Towers that appear on no map. Creatures that do not appear in any natural history. And Arcana — scattered and dangerous, waiting for someone reckless enough to pick them up.

    Expeditions are common and profitable. They are also lethal. Companies are formed, investors found, and parties equipped. The lucky ones return with crates of oddities to sell. The unlucky ones become cautionary tales. The ones who encounter something truly Old — they become something else entirely.

  factions: |
    Several factions contend for power in and around Bastion:

    The Ironclad Council: Bastion's merchant-industrialist ruling body. Pragmatic, profit-driven, and deeply suspicious of anything that disrupts commerce — including the Odd, unless it can be monetised.

    The Constabulary: Bastion's police force. Underfunded, sometimes corrupt, occasionally heroic. They deal with crime, riots, and Arcana incidents with varying levels of success.

    The Church of the Pale: An old institution that venerates the city's founding and the "Pale Fire" — a metaphor, most believe, for human ingenuity and moral will. Some high clergy have seen things that suggest the Pale Fire is not entirely metaphorical.

    The Expedition Companies: Organisations that fund and outfit expeditions beyond the city walls. The most prominent include Harwick & Sons (ruthless, efficient), the Scholars' Alliance (academic, idealistic, dangerous), and the Iron Compact (military, secretive).

    The Odd Cults: Scattered groups who worship or seek to commune with entities or phenomena from beyond the known. The Constabulary considers them dangerous. They are usually correct.

  arcana_overview: |
    Arcana are objects, creatures, or phenomena that do not conform to natural law. They are found in ruins, retrieved from deep underground, occasionally delivered by entities who don't explain themselves.

    No one fully understands how Arcana work. They cannot be reliably manufactured, though many have tried. Each Arcanum is unique in its effects and usually in its risks.

    Some Arcana are subtle — a lens that shows what isn't there, a key that opens any lock. Others are dramatic — a weapon that kills what it touches, a substance that alters the mind permanently. The worst are things that change the wielder in ways they don't notice until it's too late.

    Arcana are valuable. They are also illegal to own without a Council permit, which is expensive and rarely granted. This has made a thriving black market.

dice_tables:
  encounters:
    - "A Constabulary patrol passes, suspicious of anyone out at this hour."
    - "A dishevelled expedition survivor stumbles into view, muttering about something they found underground."
    - "A street vendor selling hot food — the smell is genuine comfort in this grim place."
    - "A scuffle nearby: two figures struggling over something small and apparently worth fighting over."
    - "Something moves in the shadows just at the edge of sight — then it's gone."
    - "A recruiting agent for one of the Expedition Companies eyes the party with professional interest."
  arcana_quirks:
    - "It hums at a frequency just below hearing — you feel it in your teeth."
    - "Animals avoid it. Dogs flee. Birds go silent when it is near."
    - "The Arcanum is always slightly warm to the touch, regardless of temperature."
    - "It appears in your dreams. It has been there for weeks."
    - "Looking at it too long gives you a headache behind your left eye."
    - "You notice it is slightly different each time you look away and look back — never enough to point at, but enough to unsettle you."

opening_hooks:
  - title: "The Recovered Package"
    description: "A crate addressed to a name you recognise arrived at the Docks without explanation. The sender is listed as deceased. Inside is something wrapped in oilcloth that pulses faintly with warmth. Someone else is looking for it."
  - title: "The Factory Incident"
    description: "Three workers on the night shift at Harwick's iron foundry did not come in this morning. The foreman is offering money — real money — to anyone who'll go in and find out what happened to them. The day workers refused after seeing what was left on the floor near the third furnace."
  - title: "Below the Pale"
    description: "A sealed section of Bastion's old undercity was breached last week during renovation work. The Constabulary closed it off. An anonymous note slipped under your door says there's a way in through the old tannery on Veil Street, and that what's down there is worth more than you've earned in a year — if you're fast."

mood:
  suggested_theme: parchment
