opening_hooks:
  - title: "The Crystalline Signal"
    description: "Something in the deep Grasslands has started broadcasting a signal that only certain people can hear. You're one of them. The Caravan's heading that direction anyway."
  - title: "The Entity's Request"
    description: "A crystalline entity the size of a building wants something delivered. It's been waiting seven hundred years. It can wait a little longer. Maybe."
  - title: "The Map That Updates"
    description: "You have a map of the Grasslands that rewrites itself as the territory changes. It's showing something ahead that shouldn't exist. The Caravan needs to know."
